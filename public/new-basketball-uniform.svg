<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Basketball uniform design -->
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6347;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main jersey body -->
  <path d="M80 100 L320 100 L320 120 L340 140 L340 500 L60 500 L60 140 L80 120 Z" fill="url(#orangeGradient)" stroke="#8B4513" stroke-width="3"/>
  
  <!-- Neckline -->
  <ellipse cx="200" cy="100" rx="40" ry="20" fill="none" stroke="#4B0082" stroke-width="4"/>
  <ellipse cx="200" cy="100" rx="35" ry="15" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- Armholes -->
  <ellipse cx="80" cy="140" rx="20" ry="40" fill="none" stroke="#4B0082" stroke-width="4"/>
  <ellipse cx="320" cy="140" rx="20" ry="40" fill="none" stroke="#4B0082" stroke-width="4"/>
  <ellipse cx="80" cy="140" rx="15" ry="35" fill="none" stroke="white" stroke-width="2"/>
  <ellipse cx="320" cy="140" rx="15" ry="35" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- Team name "LOVERS" -->
  <text x="200" y="200" font-family="Arial Black, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="white" stroke="#4B0082" stroke-width="2">LOVERS</text>
  
  <!-- Player number "01" -->
  <text x="200" y="320" font-family="Arial Black, sans-serif" font-size="120" font-weight="bold" text-anchor="middle" fill="#4B0082" stroke="white" stroke-width="3">01</text>
  
  <!-- Side stripes -->
  <rect x="60" y="140" width="8" height="360" fill="#4B0082"/>
  <rect x="68" y="140" width="4" height="360" fill="white"/>
  <rect x="332" y="140" width="8" height="360" fill="#4B0082"/>
  <rect x="328" y="140" width="4" height="360" fill="white"/>
  
  <!-- Bottom hem -->
  <rect x="60" y="490" width="280" height="10" fill="#4B0082"/>
  <rect x="60" y="495" width="280" height="2" fill="white"/>
</svg>